<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S Electrical – Admin Panel</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --yellow: #FFD100; --dark: #0A0A0A; --charcoal: #111;
      --mid: #1A1A1A; --card: #1E1E1E; --light: #F5F5F5;
      --muted: #666; --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--light); min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--dark);
      background-image: linear-gradient(rgba(255,209,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,209,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .login-box {
      background: var(--mid); border: 1px solid rgba(255,209,0,0.15);
      border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 400px;
      text-align: center;
    }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--yellow); letter-spacing: 3px; margin-bottom: 4px; }
    .login-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
    .login-field { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 16px; }
    .login-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .login-input {
      background: #111; border: 1px solid rgba(255,255,255,0.08); color: var(--light);
      padding: 13px 16px; border-radius: 6px; font-family: 'Barlow', sans-serif;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--yellow); }
    .login-btn {
      width: 100%; background: var(--yellow); color: var(--dark);
      border: none; padding: 14px; border-radius: 6px; font-family: 'Barlow', sans-serif;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; margin-top: 8px;
    }
    .login-btn:hover { background: #ffe44d; }
    .login-error { color: var(--red); font-size: 0.82rem; margin-top: 12px; display: none; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    /* Sidebar */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; background: var(--charcoal); border-right: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--yellow); letter-spacing: 3px; padding: 0 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sidebar-logo span { color: #444; }
    .sidebar-menu { padding: 20px 12px; flex: 1; }
    .menu-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 14px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
      color: var(--muted); transition: all 0.2s; letter-spacing: 0.5px;
    }
    .menu-item:hover { background: rgba(255,255,255,0.04); color: var(--light); }
    .menu-item.active { background: rgba(255,209,0,0.1); color: var(--yellow); }
    .menu-item i { width: 18px; text-align: center; }
    .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.05); }
    .logout-btn {
      display: flex; align-items: center; gap: 12px; padding: 11px 14px;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem; font-weight: 600;
      color: var(--muted); transition: all 0.2s; width: 100%; background: none; border: none;
    }
    .logout-btn:hover { color: var(--red); background: rgba(239,68,68,0.08); }

    /* Main */
    .main { flex: 1; padding: 36px 40px; overflow-y: auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge-new { background: var(--red); color: white; font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 20px; letter-spacing: 1px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 22px 24px; }
    .stat-card-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .stat-card-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; line-height: 1; }
    .stat-card-num.yellow { color: var(--yellow); }
    .stat-card-num.green { color: var(--green); }
    .stat-card-num.red { color: var(--red); }
    .stat-card-num.blue { color: var(--blue); }

    /* Filters */
    .filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .filter-btn { background: var(--card); border: 1px solid rgba(255,255,255,0.07); color: var(--muted); padding: 8px 18px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .filter-btn.active { background: rgba(255,209,0,0.1); border-color: var(--yellow); color: var(--yellow); }
    .search-input { background: var(--card); border: 1px solid rgba(255,255,255,0.07); color: var(--light); padding: 8px 16px; border-radius: 6px; font-family: 'Barlow', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s; margin-left: auto; width: 220px; }
    .search-input:focus { border-color: var(--yellow); }

    /* Enquiry cards */
    .enquiry-list { display: flex; flex-direction: column; gap: 12px; }
    .enquiry-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px; padding: 22px 24px;
      transition: border-color 0.2s;
    }
    .enquiry-card:hover { border-color: rgba(255,209,0,0.2); }
    .enquiry-card.is-new { border-left: 3px solid var(--yellow); }
    .eq-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
    .eq-name { font-weight: 700; font-size: 1.05rem; }
    .eq-date { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .eq-fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .eq-field-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .eq-field-val { font-size: 0.88rem; color: var(--light); }
    .eq-message { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 12px 14px; font-size: 0.85rem; color: #aaa; line-height: 1.6; margin-bottom: 14px; }
    .eq-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status-badge { font-size: 0.65rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; }
    .status-new    { background: rgba(255,209,0,0.15); color: var(--yellow); }
    .status-read   { background: rgba(59,130,246,0.15); color: var(--blue); }
    .status-done   { background: rgba(34,197,94,0.15); color: var(--green); }
    .eq-actions { display: flex; gap: 8px; margin-left: auto; }
    .eq-btn { background: rgba(255,255,255,0.05); border: none; color: var(--muted); padding: 7px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .eq-btn:hover { background: rgba(255,255,255,0.1); color: var(--light); }
    .eq-btn.call { color: var(--green); }
    .eq-btn.call:hover { background: rgba(34,197,94,0.1); }
    .eq-btn.del { color: var(--red); }
    .eq-btn.del:hover { background: rgba(239,68,68,0.1); }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-text { font-size: 1rem; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">S Electrical</div>
    <div class="login-sub">Admin Panel</div>
    <div class="login-field">
      <label class="login-label">Username</label>
      <input class="login-input" id="l-user" type="text" placeholder="admin" />
    </div>
    <div class="login-field">
      <label class="login-label">Password</label>
      <input class="login-input" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-error" id="login-error">Incorrect username or password.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">S <span>Electrical</span></div>
      <nav class="sidebar-menu">
        <div class="menu-item active"><i class="fa-solid fa-inbox"></i> Enquiries</div>
      </nav>
      <div class="sidebar-bottom">
        <button class="logout-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-title">ENQUIRIES</div>
        <div class="topbar-right">
          <span class="badge-new" id="new-count-badge" style="display:none"></span>
        </div>
      </div>

      <div class="stats-row" id="stats-row"></div>

      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('new', this)">New</button>
        <button class="filter-btn" onclick="setFilter('read', this)">Read</button>
        <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
        <input class="search-input" id="search-box" type="text" placeholder="🔍  Search name or phone..." oninput="renderList()" />
      </div>

      <div class="enquiry-list" id="enquiry-list"></div>
    </main>
  </div>
</div>

<script>
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'admin123';
  let currentFilter = 'all';

  function doLogin() {
    const u = document.getElementById('l-user').value.trim();
    const p = document.getElementById('l-pass').value.trim();
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderAll();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function doLogout() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('l-pass').value = '';
  }

  function getEnquiries() {
    return JSON.parse(localStorage.getItem('se_enquiries') || '[]');
  }
  function saveEnquiries(data) {
    localStorage.setItem('se_enquiries', JSON.stringify(data));
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderAll() {
    renderStats();
    renderList();
  }

  function renderStats() {
    const all = getEnquiries();
    const newC  = all.filter(e => e.status === 'new').length;
    const doneC = all.filter(e => e.status === 'done').length;
    const readC = all.filter(e => e.status === 'read').length;

    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-card-label">Total Enquiries</div><div class="stat-card-num yellow">${all.length}</div></div>
      <div class="stat-card"><div class="stat-card-label">New</div><div class="stat-card-num red">${newC}</div></div>
      <div class="stat-card"><div class="stat-card-label">In Progress</div><div class="stat-card-num blue">${readC}</div></div>
      <div class="stat-card"><div class="stat-card-label">Completed</div><div class="stat-card-num green">${doneC}</div></div>
    `;

    const badge = document.getElementById('new-count-badge');
    if (newC > 0) { badge.textContent = newC + ' New'; badge.style.display = 'inline'; }
    else badge.style.display = 'none';
  }

  function renderList() {
    const all = getEnquiries();
    const search = document.getElementById('search-box').value.toLowerCase();
    let filtered = all.filter(e => {
      const matchFilter = currentFilter === 'all' || e.status === currentFilter;
      const matchSearch = !search || e.name.toLowerCase().includes(search) || e.phone.includes(search);
      return matchFilter && matchSearch;
    });

    const container = document.getElementById('enquiry-list');
    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No enquiries found</div></div>`;
      return;
    }

    container.innerHTML = filtered.map(e => `
      <div class="enquiry-card ${e.status === 'new' ? 'is-new' : ''}" id="card-${e.id}">
        <div class="eq-header">
          <div>
            <div class="eq-name">${e.name}</div>
          </div>
          <div class="eq-date"><i class="fa-regular fa-clock" style="margin-right:5px;opacity:0.5"></i>${e.date}</div>
        </div>
        <div class="eq-fields">
          <div><div class="eq-field-label">Phone</div><div class="eq-field-val">${e.phone || '—'}</div></div>
          <div><div class="eq-field-label">Email</div><div class="eq-field-val">${e.email || '—'}</div></div>
          <div><div class="eq-field-label">Service</div><div class="eq-field-val">${e.service || '—'}</div></div>
        </div>
        ${e.message ? `<div class="eq-message">"${e.message}"</div>` : ''}
        <div class="eq-footer">
          <span class="status-badge status-${e.status}">${e.status}</span>
          <div class="eq-actions">
            ${e.phone ? `<button class="eq-btn call" onclick="window.open('tel:${e.phone}')"><i class="fa-solid fa-phone"></i> Call</button>` : ''}
            ${e.status !== 'read'  ? `<button class="eq-btn" onclick="setStatus(${e.id},'read')"><i class="fa-solid fa-eye"></i> Mark Read</button>` : ''}
            ${e.status !== 'done'  ? `<button class="eq-btn" onclick="setStatus(${e.id},'done')"><i class="fa-solid fa-check"></i> Mark Done</button>` : ''}
            <button class="eq-btn del" onclick="deleteEnquiry(${e.id})"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function setStatus(id, status) {
    const data = getEnquiries();
    const idx = data.findIndex(e => e.id === id);
    if (idx > -1) { data[idx].status = status; saveEnquiries(data); renderAll(); }
  }

  function deleteEnquiry(id) {
    if (!confirm('Delete this enquiry?')) return;
    const data = getEnquiries().filter(e => e.id !== id);
    saveEnquiries(data);
    renderAll();
  }

  // Auto-refresh every 10 seconds when dashboard is open
  setInterval(() => {
    if (document.getElementById('dashboard').style.display !== 'none') renderAll();
  }, 10000);
</script>

</body>
</html>
